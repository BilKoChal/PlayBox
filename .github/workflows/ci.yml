# PlayBox — CI/CD Pipeline
#
# Triggers:
#   - Push to main     → full pipeline (test + deploy pages + build native + release)
#   - Pull Request     → test only (lint, type-check, build smoke test)
#
# GitHub Repo Settings Required:
#   1. Settings → Pages → Source: "GitHub Actions"
#   2. Settings → Actions → General → Workflow permissions: "Read and write"
#
# The app will be live at: https://<owner>.github.io/<repo>/

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  RUST_VERSION: "stable"
  JAVA_VERSION: "17"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─── Job 1: Test ────────────────────────────────────────────────────────
  test:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Type-check
        run: pnpm tsc -b

      - name: Build (production)
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─── Job 2: Deploy to GitHub Pages ──────────────────────────────────────
  deploy-pages:
    name: Deploy GitHub Pages
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Add .nojekyll (GitHub Pages compat)
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── Job 3: Build Windows (Tauri v2) ────────────────────────────────────
  build-windows:
    name: Build Windows (.exe + .msi)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "PlayBox v__VERSION__"
          releaseBody: "See the assets below to download and install PlayBox."
          releaseDraft: true
          prerelease: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7
          if-no-files-found: warn

  # ─── Job 4: Build Android (Capacitor) ───────────────────────────────────
  build-android:
    name: Build Android (.apk)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.properties') }}
          restore-keys: gradle-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android debug APK
        working-directory: android
        run: |
          chmod +x gradlew || true
          ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: warn

  # ─── Job 5: Create GitHub Release ───────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [deploy-pages, build-windows, build-android]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: release-artifacts/windows/

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts
          path: release-artifacts/android/

      - name: List release artifacts
        run: find release-artifacts/ -type f || echo "No artifacts found"

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "PlayBox v${{ steps.version.outputs.version }}"
          body: |
            ## PlayBox v${{ steps.version.outputs.version }}

            ### Downloads
            - **Windows**: Download the `.exe` (NSIS installer) or `.msi` below
            - **Android**: Download the `.apk` below
            - **Web**: Visit the [GitHub Pages site](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)

            ### What's New
            See commit history for changes since last release.
          draft: false
          prerelease: false
          files: |
            release-artifacts/windows/**/*
            release-artifacts/android/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
